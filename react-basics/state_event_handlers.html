        function ChatInput({chatMessages , setChatMessages}) { 
         const [inputText, setInputText] = React.useState('');
          function saveInputText(event) {
            setInputText(event.target.value);
          }
          function SendMessage(){

            const newChatMessages = [
                
                  // ... is a spread operatot that creates a copy of an array and we use copies in react to change the real value cause its efficient 

                    ...chatMessages,
                    {
                      message: inputText,
                      sender: 'user',
                      id: crypto.randomUUID()
                    }
                  ]

              setChatMessages(newChatMessages);  

                  const response =  Chatbot.getResponse(inputText);

                   setChatMessages([
                    ...newChatMessages,     // didnt use the og one chatMessages because it aint returning the full changed value so now first we stored the value in a varuable then used its copy to change

                    {
                      message: response,
                      sender: 'robot',
                      id: crypto.randomUUID()
                    }
                  ]);  
                  setInputText('');

          }
            return (
                <>
                    <input
                     placeholder="Enter your query"
                     size="30"
                     onChange={saveInputText}
                     value={inputText}
                     />
                    <button onClick={SendMessage} >Send</button>
                </>
            );
        }

        }
